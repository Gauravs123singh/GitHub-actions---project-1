name: react-app
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6
      - name: setup node version 20
        uses: actions/setup-node@v6
        with:
            node-version: 20

      - name: Adding Cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: install npm package
        run: npm ci

      - name: run test
        run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: deploying the app
        uses: actions/checkout@v6
      - name: setup node version 20
        uses: actions/setup-node@v6
        with:
             node-version: 20
      - name: Adding Cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          
      - name: install npm package
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: build project
        run: npm run build
      - name: Deploy
        run: echo "Deployment successful!"
        
